# java.util.logging configuration for the test classpath.
#
# Replaces the default ConsoleHandler with the SLF4J bridge so every JUL log line
# (used by libraries like JSVG, JOGL, dcm4che) is forwarded to SLF4J and filtered
# by the shared logback-test.xml. The root level is set to ALL because filtering
# happens on the SLF4J/Logback side; per-logger silencing should be configured
# in logback-test.xml, not here.

handlers=org.slf4j.bridge.SLF4JBridgeHandler
.level=ALL
